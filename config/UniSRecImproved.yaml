# ── Transformer backbone ────────────────────────────────────────────────────
n_layers: 3          # deeper encoder (was 2)
n_heads: 4           # more attention heads (was 2)
hidden_size: 256     # power-of-2, divisible by 4 heads (was 300)
inner_size: 512      # wider FFN (was 256)
hidden_dropout_prob: 0.3   # reduced (was 0.5)
attn_dropout_prob: 0.3     # reduced (was 0.5)
hidden_act: 'gelu'
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: 'CE'

# ── UniSRec-specific ────────────────────────────────────────────────────────
item_drop_ratio: 0.2
item_drop_coefficient: 0.9
lambda: 0.01         # stronger seq-seq contrastive weight (was 1e-3)
label_smoothing: 0.1 # label smoothing on CE loss

plm_suffix: blair-roberta-base.feature # update for any other LLMs likw Qwen
train_stage: inductive_ft  # pretrain / inductive_ft / transductive_ft
plm_size: 768
adaptor_dropout_prob: 0.1   # deep adapter needs less dropout (was 0.2)
adaptor_layers: [768, 256]  # match new hidden_size (was [768, 300])
temperature: 0.07    # initial value; becomes learnable nn.Parameter in model
n_exps: 8

tensorboard: false

# ── Ablation flags (all ON = full model) ────────────────────────────────────
use_deep_moe: true
use_layer_aggregation: true
use_learnable_temperature: true
use_label_smoothing: true
