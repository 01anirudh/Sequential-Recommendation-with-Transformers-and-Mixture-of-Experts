# BlairRec Configuration - Basic SASRec with Blair PLM (No MoE)

# SASRec base parameters - Matches UniSRecImproved for fair comparison
n_layers: 3  
n_heads: 4   
hidden_size: 256  
inner_size: 512  
hidden_dropout_prob: 0.3
attn_dropout_prob: 0.3
hidden_act: 'gelu'
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: 'CE'

# PLM configuration - Blair-Roberta
plm_suffix: blair-roberta-base.feature
plm_size: 768  # BLAIR dimension
adaptor_dropout_prob: 0.2
adaptor_layers: [768, 256]  # Match hidden_size

# Training configuration
temperature: 0.07
learning_rate: 0.001
train_batch_size: 2048
eval_batch_size: 2048
epochs: 300
stopping_step: 10

# Optimizer
optimizer: adamw
weight_decay: 0.0

# Hardware
gpu_id: 1
seed: 2020

# Logging
tensorboard: false

# Evaluation
eval_args: {'split': {'LS': 'valid_and_test'}, 'order': 'TO', 'group_by': 'user', 'mode': {'valid': 'full', 'test': 'full'}}
metrics: ['Recall', 'NDCG']
topk: [10, 50]
valid_metric: NDCG@10
