# LLaMARec Configuration - Optimized for A100 80GB GPU

# SASRec base parameters - LARGER
n_layers: 4
n_heads: 8
hidden_size: 512
inner_size: 1024
hidden_dropout_prob: 0.3
attn_dropout_prob: 0.3
hidden_act: 'gelu'
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: 'CE'

# PLM configuration - LLaMA-3-8B
plm_suffix: llama-3-8b.feature
plm_size: 4096
adaptor_dropout_prob: 0.2
adaptor_layers: [4096, 512]

# Training configuration - A100 OPTIMIZED
temperature: 0.07
lambda: 0.001
learning_rate: 0.001
train_batch_size: 1024
eval_batch_size: 2048
epochs: 100
stopping_step: 15

# Optimizer
optimizer: adamw
weight_decay: 0.01

# Hardware
gpu_id: 0
seed: 2023

# # Logging - disable tensorboard to avoid disk quota
tensorboard: false
# checkpoint_dir: /scratch/satyamk_iitp/checkpoints

# Evaluation
metrics: ['Recall', 'NDCG']
topk: [10, 50]
valid_metric: Recall@10
